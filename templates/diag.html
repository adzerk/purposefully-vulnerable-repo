{% extends "base.html" %}
{% block title %}Diagnostics{% endblock %}
{% block content %}
<div class="card">
  <h2>Network Diagnostics</h2>
  <form method="post" action="/diag/ping" style="display:flex;gap:0.5rem;margin-bottom:1rem;">
    <input type="text" name="host" placeholder="Hostname or IP (e.g. 8.8.8.8)" style="max-width:300px;">
    <button class="btn" type="submit">Ping</button>
  </form>
  {% if output %}
    <pre>{{ output }}</pre>
  {% endif %}
</div>
{% endblock %}
